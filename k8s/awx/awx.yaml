apiVersion: awx.ansible.com/v1beta1
kind: AWX
metadata:
  name: awx
spec:
  admin_user: admin
  admin_password_secret: awx-admin-password
  secret_key_secret: awx-secret-key

  service_type: NodePort
  nodeport_port: 30080
  ingress_type: none

  image: quay.io/ansible/awx
  image_version: "24.6.1"
  image_pull_policy: IfNotPresent

  control_plane_ee_image: quay.io/ansible/awx-ee:24.6.1
  init_container_image: quay.io/ansible/awx-ee
  init_container_image_version: "24.6.1"

  ee_images:
    - name: awx-ee
      image: quay.io/ansible/awx-ee:24.6.1

  redis_image: docker.io/redis
  redis_image_version: "7"

  postgres_image: quay.io/sclorg/postgresql-15-c9s
  postgres_image_version: "latest"
  postgres_storage_class: local-path
  postgres_storage_requirements:
    requests:
      storage: 8Gi
  postgres_resource_requirements:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 1Gi
  postgres_data_volume_init: true

  projects_persistence: false

  web_resource_requirements:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  task_resource_requirements:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  ee_resource_requirements:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "500m"
      memory: 512Mi

  redis_resource_requirements:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "250m"
      memory: 256Mi

  init_container_resource_requirements:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "250m"
      memory: 256Mi

  csrf_cookie_secure: "False"
  session_cookie_secure: "False"

  extra_settings:
    - setting: CSRF_TRUSTED_ORIGINS
      value: "['http://localhost:8080']"
